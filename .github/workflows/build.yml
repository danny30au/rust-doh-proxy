name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          # Uncomment to add aarch64 builds:
          # - aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Uncomment if adding aarch64 target:
      # - name: Install aarch64 cross-compile toolchain
      #   if: matrix.target == 'aarch64-unknown-linux-musl'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
      #     echo '[target.aarch64-unknown-linux-musl]' >> ~/.cargo/config.toml
      #     echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release binary
        run: |
          cargo build --release --features http3 --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/doh-proxy

      - name: Show binary size
        run: |
          ls -lh target/${{ matrix.target }}/release/doh-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: doh-proxy-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/doh-proxy
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries with target suffix
        run: |
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            # Strip the "doh-proxy-" prefix to get the target triple
            triple="${target#doh-proxy-}"
            mv "$dir/doh-proxy" "artifacts/doh-proxy-${triple}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/doh-proxy-*
          generate_release_notes: true
          draft: false
          prerelease: false
